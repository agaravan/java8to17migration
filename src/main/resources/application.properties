server.port=5000
server.address=0.0.0.0
spring.jackson.serialization.indent-output=true
migration.workspace.dir=./workspace
migration.max-concurrent=3
app.version=@project.version@
# Full path to the Maven executable on the server.
# This is set to the known Windows Server installation path.
# Change only if Maven is installed elsewhere.
migration.maven.executable=F:/Test/Maven-3.9.6/bin/mvn.cmd

# Logging levels - set to DEBUG for detailed Maven resolution and execution logs
logging.level.com.migration=INFO
logging.level.com.migration.service.MigrationExecutorService=DEBUG
